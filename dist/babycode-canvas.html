<style>
:root {
  --paper: #faf9f5;
  --card: #ffffff;
  --ink: #2c2c2a;
  --ink-2: #5f5e5a;
  --ink-3: #9a988f;
  --line: #e3dfd4;
  --line-2: #cfcaba;
  --clay: #d97757;
  --clay-soft: #fbeee8;

* { box-sizing: border-box; margin: 0; }
html, body { height: 100%; }
body { font-family: var(--font); color: var(--ink); background: var(--paper); display: flex; flex-direction: column; overflow: hidden; }

#topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--card); }
#brand { font-size: 15px; font-weight: 600; }
#meta { font-size: 12px; font-weight: 400; color: var(--ink-3); margin-left: 10px; }
#toolbar { display: flex; gap: 8px; }
button { font-family: var(--font); font-size: 13px; color: var(--ink); background: var(--card); border: 1px solid var(--line-2); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
button:hover { background: var(--paper); }
button:active { transform: scale(0.98); }

#legend { display: flex; gap: 16px; align-items: center; padding: 6px 16px; font-size: 12px; color: var(--ink-2); border-bottom: 1px solid var(--line); }
#legend .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
#changes-chip { font-size: 12px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--amber); color: var(--amber-deep); background: var(--amber-soft); }
#changes-chip:hover { background: #f6e3c3; }
#search { font-family: var(--font); font-size: 12px; border: 1px solid var(--line); border-radius: 8px; padding: 4px 9px; width: 170px; outline: none; background: var(--card); }
#search:focus { border-color: var(--clay); }
#lang-select { font-family: var(--font); font-size: 12px; border: 1px solid var(--line-2); border-radius: 8px; padding: 4px 6px; background: var(--card); color: var(--ink); }
.help { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--line-2); color: var(--ink-3); font-size: 12px; cursor: help; }
.sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
.sw-l4 { background: var(--blue-soft); border: 1px solid var(--blue); }
.sw-l3 { background: var(--card); border: 1px solid var(--line-2); }
.sw-tool { background: var(--paper); border: 1px dashed var(--ink-3); }

#canvas { position: relative; flex: 1; overflow: hidden; cursor: default; }
#world { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
#edges { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; }
#edges path { fill: none; stroke: var(--line-2); stroke-width: 1.6; }
#edges path.hot { stroke: var(--clay); stroke-width: 2; }
#edges path.faded { opacity: 0.18; }
#edges path.hover-hot { stroke: var(--clay); stroke-width: 2; opacity: 1; }
#cards { position: absolute; left: 0; top: 0; }

.card { position: absolute; background: var(--card); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 1px 3px rgba(60, 50, 30, 0.06); cursor: grab; user-select: none; font-size: 13px; }
.card:hover { border-color: var(--line-2); }
.card.selected { border: 2px solid var(--clay); box-shadow: 0 2px 8px rgba(217, 119, 87, 0.25); }
.card.changed { border-color: var(--amber); }
.card.faded { opacity: 0.3; }
.card.dim { opacity: 0.22; }
.badge-changed { float: right; font-size: 0.77em; color: var(--amber-deep); background: var(--amber-soft); border: 1px solid var(--amber); border-radius: 999px; padding: 1px 7px; margin: 1px 0 0 6px; }
.card-head { padding: 0.69em 0.92em 0.54em; border-bottom: 1px solid var(--line); border-radius: 11px 11px 0 0; }
.card.l4 .card-head { background: var(--blue-soft); }
.card-title { font-size: 1em; font-weight: 600; }
.card.l4 .card-title { color: var(--blue); }
.card-sub { font-size: 0.85em; color: var(--ink-3); font-family: var(--mono); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mod-dot { display: inline-block; width: 0.54em; height: 0.54em; border-radius: 2px; margin-right: 5px; }
.fn-row { display: flex; justify-content: space-between; gap: 8px; padding: 0.46em 0.92em; font-size: 0.92em; border-top: 1px solid #f1eee6; }
.fn-row:first-of-type { border-top: none; }
.fn-desc { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fn-desc.blank { color: var(--ink-3); font-style: italic; }
.fn-desc.minor { color: var(--ink-3); }
.fn-more { color: var(--ink-3); font-style: italic; }
.fn-refs { color: var(--ink-3); font-size: 0.88em; flex-shrink: 0; }
.fn-dot { display: inline-block; width: 0.54em; height: 0.54em; border-radius: 50%; margin-right: 6px; }
.fn-dot.added { background: var(--green); }
.fn-dot.changed { background: var(--amber); }

#tools-box { position: absolute; border: 1.5px dashed var(--ink-3); border-radius: 16px; pointer-events: none; }
.band-label { position: absolute; font-size: 12px; font-weight: 600; color: var(--ink-3); background: var(--paper); padding: 0 8px; pointer-events: none; }
.band-label.iso { color: var(--amber-deep); }
.minor-tag { font-size: 10px; color: var(--ink-3); border: 1px solid var(--line); border-radius: 999px; padding: 0 6px; }

#marquee { position: absolute; border: 1.5px dashed var(--clay); background: rgba(217, 119, 87, 0.07); border-radius: 6px; pointer-events: none; }
#empty-tip { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 14px; color: var(--ink-3); }

#detail { position: absolute; left: 16px; bottom: 78px; width: 460px; max-width: 44vw; max-height: 62vh; overflow: auto; background: var(--card); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 4px 16px rgba(60, 50, 30, 0.12); padding: 14px 16px; font-size: 12px; z-index: 5; }
#detail h3 { font-size: 14px; margin-bottom: 2px; padding-right: 24px; }
#detail .d-path { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-bottom: 6px; word-break: break-all; }
.d-fn { border-top: 1px solid #f1eee6; padding: 8px 0; }
.d-fn-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.d-name { font-family: var(--mono); font-size: 12.5px; font-weight: 600; word-break: break-all; }
.d-lv { font-size: 10px; color: var(--ink-2); border: 1px solid var(--line-2); border-radius: 999px; padding: 0 6px; }
.d-refs { font-size: 11px; color: var(--ink-3); margin-left: auto; white-space: nowrap; }
.d-sig { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); margin-top: 3px; word-break: break-all; white-space: pre-wrap; }
.d-desc { font-size: 12.5px; margin-top: 3px; line-height: 1.5; }
.d-desc.blank { color: var(--ink-3); font-style: italic; }
#detail .d-note { margin-top: 10px; color: var(--ink-3); }
#detail .d-close { position: absolute; right: 8px; top: 8px; border: none; background: none; font-size: 14px; color: var(--ink-3); padding: 2px 6px; }

#action-bar { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--line-2); border-radius: 14px; box-shadow: 0 6px 20px rgba(60, 50, 30, 0.15); padding: 10px 12px; width: min(640px, 92vw); z-index: 6; }
#sel-count { font-size: 12px; color: var(--ink-2); flex-shrink: 0; white-space: nowrap; }
#instruction { flex: 1; font-family: var(--font); font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; resize: none; outline: none; }
#instruction:focus { border-color: var(--clay); }
#btn-prompt { background: var(--clay); color: #fff; border: none; flex-shrink: 0; }
#btn-prompt:hover { background: #c9663f; }

#toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%); background: var(--ink); color: #fff; font-size: 13px; padding: 8px 16px; border-radius: 10px; z-index: 9; }
body.dropping #canvas { outline: 3px dashed var(--clay); outline-offset: -6px; }
</style>
</head>

// 取当前语言的一条文案，{0}{1} 会被参数替换
function t(key) {
  var pack = I18N[getLang()] || I18N.zh;
  var s = pack[key] != null ? pack[key] : (I18N.zh[key] != null ? I18N.zh[key] : key);
  for (var i = 1; i < arguments.length; i++) s = s.split('{' + (i - 1) + '}').join(arguments[i]);
  return s;
}

// 语言优先级：用户手选（localStorage）> 项目数据声明 > 浏览器语言
function pickLang(graphLang) {
  var saved = null;
  try { saved = localStorage.getItem('babycode-lang'); } catch (e) { saved = null; }
  if (saved && I18N[saved]) return saved;
  if (graphLang && I18N[graphLang]) return graphLang;
  var nav = (typeof navigator !== 'undefined' && navigator.language) || 'zh';
  return nav.toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en';
}

// 启动时按优先级定语言，但不写入 localStorage（只有用户手选才记住）
function initLang(graphLang) { CURRENT_LANG = pickLang(graphLang); }

function getLang() { return CURRENT_LANG || (CURRENT_LANG = pickLang(null)); }

// 用户手动切换：立即生效并记住
function setLang(lang) {
  CURRENT_LANG = I18N[lang] ? lang : 'zh';
  try { localStorage.setItem('babycode-lang', CURRENT_LANG); } catch (e) { return; }
}

// 当前界面语言对应的演示项目
function demoGraph() { return normalizeGraph(getLang() === 'en' ? DEMO_GRAPH_EN : DEMO_GRAPH); }

// 取路径最后一段作为卡片标题（专业名给 AI，标题给人扫一眼）
function baseName(path) {
  var parts = String(path).split('/');
  return parts[parts.length - 1] || path;
}

// 文件层级 = 其函数的最高层级；全部未标注时按 L3 处理
function fileLevel(functions) {
  var best = 0;
  for (var i = 0; i < functions.length; i++) {
    var r = LEVEL_RANK[functions[i].level] || 0;
    if (r > best) best = r;
  }
  return best ? 'L' + best : 'L3';
}

// 把 graph.json / 解析结果统一成 viewer 内部结构（容错：缺列按 '-' 处理）
function normalizeGraph(raw) {
  var files = (raw.files || []).map(function (f) {
    var fns = (f.functions || []).map(function (fn) {
      return {
        name: fn.name || '-',
        level: LEVEL_RANK[fn.level] ? fn.level : '-',
        signature: fn.signature && fn.signature !== '-' ? fn.signature : '',
        refs: fn.refs === 0 || fn.refs ? fn.refs : '-',
        desc: fn.desc && fn.desc !== '-' ? fn.desc : '',
        minor: !!fn.minor
      };
    });
    var lv = fileLevel(fns);
    return {
      path: f.path, module: f.module || moduleOf(f.path), name: baseName(f.path),
      level: lv, isTool: LEVEL_RANK[lv] <= 2, functions: fns,
      minorOnly: fns.length > 0 && fns.every(function (fn) { return fn.minor; })
    };
  });
  var known = {};
  files.forEach(function (f) { known[f.path] = true; });
  var edges = (raw.edges || []).filter(function (e) { return known[e.from] && known[e.to] && e.from !== e.to; });
  var changes = raw.changes && raw.changes.entries && raw.changes.entries.length ? raw.changes : null;
  if (changes) markChanges(files, changes.entries);
  return { meta: raw.meta || {}, files: files, edges: edges, changes: changes };
}

// 把"上次任务动过"的标记落到文件和函数上，画布据此高亮
function markChanges(files, entries) {
  files.forEach(function (f) {
    f.functions.forEach(function (fn) {
      entries.forEach(function (e) {
        if (e.path === f.path && e.name === fn.name && e.kind !== 'removed') {
          fn.changedKind = e.kind;
          f.changed = true;
        }
      });
    });
  });
}

// 用倒数第二层目录当模块名；单层路径就用文件名
function moduleOf(path) {
  var parts = String(path).split('/');
  return parts.length > 1 ? parts[parts.length - 2] : baseName(path);
}

// 解析 FUNCTIONS.md（阶段一项目没有 graph，直接喂注册表也能出图，只是没有连线）
function parseFunctionsMd(text) {
  var lines = String(text).split('\n');
  var meta = { stage: 1 };
  var head = /stage:(\d+)/.exec(lines[0] || '');
  if (head) meta.stage = parseInt(head[1], 10);
  var langFlag = /canvas:(\w+)/.exec(lines[0] || '');
  if (langFlag && langFlag[1] !== 'off' && langFlag[1] !== 'on') meta.lang = langFlag[1];
  var byPath = {};
  var order = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (line.charAt(0) !== '|') continue;
    var c = line.split('|').map(function (s) { return s.trim(); });
    if (c.length < 7 || c[1] === 'name') continue;
    if (c[1] === 'module' || (!LEVEL_RANK[c[2]] && c[2] !== '-')) {
      throw new Error('Stage 3? use docs/registry/graph.json');
    }
    var path = c[4];
    if (!byPath[path]) { byPath[path] = []; order.push(path); }
    byPath[path].push({ name: c[1], level: c[2], signature: c[3], refs: c[5], desc: c[6] });
  }
  if (!order.length) throw new Error('no rows found (FUNCTIONS.md / graph.json / graph.js)');
  var files = order.map(function (p) { return { path: p, functions: byPath[p] }; });
  return normalizeGraph({ meta: meta, files: files, edges: [] });
}

// layout.js — 布局层：分层排布、模块聚类、孤立带、卡片缩放、连线走向（纯计算，可测试）

var CARD_W = 230;
var GAP_X = 70;
var GAP_Y = 90;
var MAX_ROWS_SHOWN = 7;

// 细节开关决定小函数是否可见
function visibleFns(file, showMinor) {
  return showMinor ? file.functions : file.functions.filter(function (fn) { return !fn.minor; });
}

function visibleFiles(graph, showMinor) {
  return showMinor ? graph.files : graph.files.filter(function (f) { return !f.minorOnly; });
}

// 卡片尺寸随缩放档位与可见函数行数走；超过上限折叠成"还有 N 个"提示行
function measureCard(file, showMinor, scale) {
  var s = scale || 1;
  var n = visibleFns(file, showMinor).length;
  var shown = Math.min(n, MAX_ROWS_SHOWN);
  return { w: Math.round(CARD_W * s), h: Math.round((50 + shown * 30 + (n > shown ? 26 : 0)) * s) };
}

// 排一批卡片成若干行，返回新的 y；顺便记录本批第一行的位置给层带标签用
function placeRows(group, cap, w, y, positions, sizes, state) {
  for (var i = 0; i < group.length; i += cap) {
    var row = group.slice(i, i + cap);
    var width = row.length * w + (row.length - 1) * GAP_X;
    var x = Math.max(40, (cap * w + (cap - 1) * GAP_X - width) / 2 + 40);
    var maxH = 0;
    row.forEach(function (f) {
      positions[f.path] = { x: x, y: y };
      x += w + GAP_X;
      if (sizes[f.path].h > maxH) maxH = sizes[f.path].h;
    });
    if (x - GAP_X > state.right) state.right = x - GAP_X;
    y += maxH + GAP_Y;
  }
  return y;
}

// 流程区：有连线的按 L4/L3 分行；真正孤立的文件单独一条"独立模块"带；tools 靠右装框
function computeLayout(graph, showMinor, scale) {
  var positions = {}, sizes = {}, bands = [], isoLabel = null;
  var files = visibleFiles(graph, showMinor);
  files.forEach(function (f) { sizes[f.path] = measureCard(f, showMinor, scale); });
  var w = Math.round(CARD_W * (scale || 1));
  var flow = files.filter(function (f) { return !f.isTool; });
  var tools = files.filter(function (f) { return f.isTool; });
  var byModule = function (a, b) {
    return a.module === b.module ? (a.path < b.path ? -1 : 1) : (a.module < b.module ? -1 : 1);
  };
  var linked = {};
  graph.edges.forEach(function (e) { linked[e.from] = 1; linked[e.to] = 1; });
  var hasEdges = graph.edges.length > 0;
  var main = hasEdges ? flow.filter(function (f) { return linked[f.path]; }) : flow;
  var orphans = hasEdges ? flow.filter(function (f) { return !linked[f.path]; }) : [];
  var cap = Math.max(3, Math.min(6, Math.ceil(Math.sqrt(flow.length * 1.6))));
  var st = { right: 0 };
  var y = 40;
  ['L4', 'L3'].forEach(function (lv) {
    var group = main.filter(function (f) { return f.level === lv; }).sort(byModule);
    if (!group.length) return;
    bands.push({ key: lv, x: 44, y: y - 26 });
    y = placeRows(group, cap, w, y, positions, sizes, st);
  });
  if (orphans.length) {
    y += 34;
    isoLabel = { x: 44, y: y - 26 };
    y = placeRows(orphans.sort(byModule), cap, w, y, positions, sizes, st);
  }
  var toolsBox = null;
  if (tools.length) {
    tools.sort(byModule);
    var cols = tools.length > 5 ? 2 : 1;
    var tx = (st.right || 40) + 110, ty = 40;
    var colBottom = [];
    for (var c = 0; c < cols; c++) colBottom[c] = ty + 20;
    tools.forEach(function (f, i) {
      var col = i % cols;
      positions[f.path] = { x: tx + 24 + col * (w + 24), y: colBottom[col] + 26 };
      colBottom[col] = positions[f.path].y + sizes[f.path].h - 6;
    });
    toolsBox = { x: tx, y: ty, w: cols * w + (cols - 1) * 24 + 48, h: Math.max.apply(null, colBottom) - ty + 30 };
  }
  return { positions: positions, sizes: sizes, toolsBox: toolsBox, bands: bands, isoLabel: isoLabel,
    bbox: layoutBbox(positions, sizes, toolsBox) };
}

// 全部卡片 + tools 框的外接矩形，用于"看全貌"
function layoutBbox(positions, sizes, toolsBox) {
  var x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
  Object.keys(positions).forEach(function (p) {
    var pos = positions[p], s = sizes[p];
    if (pos.x < x1) x1 = pos.x;
    if (pos.y < y1) y1 = pos.y;
    if (pos.x + s.w > x2) x2 = pos.x + s.w;
    if (pos.y + s.h > y2) y2 = pos.y + s.h;
  });
  if (toolsBox) {
    if (toolsBox.x < x1) x1 = toolsBox.x;
    if (toolsBox.y < y1) y1 = toolsBox.y;
    if (toolsBox.x + toolsBox.w > x2) x2 = toolsBox.x + toolsBox.w;
    if (toolsBox.y + toolsBox.h > y2) y2 = toolsBox.y + toolsBox.h;
  }
  if (x1 === Infinity) return { x: 0, y: 0, w: 800, h: 500 };
  return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
}

// 连线锚点：横向差距大走左右侧边，否则走下边→上边
function edgePath(fromPos, fromSize, toPos, toSize) {
  var fcx = fromPos.x + fromSize.w / 2, tcx = toPos.x + toSize.w / 2;
  var dx = (toPos.x > fromPos.x + fromSize.w || fromPos.x > toPos.x + toSize.w);
  var x1, y1, x2, y2;
  if (dx) {
    var leftToRight = tcx > fcx;
    x1 = leftToRight ? fromPos.x + fromSize.w : fromPos.x;
    y1 = fromPos.y + fromSize.h / 2;
    x2 = leftToRight ? toPos.x : toPos.x + toSize.w;
    y2 = toPos.y + toSize.h / 2;
    var mx = (x1 + x2) / 2;
    return 'M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2;
  }
  var down = toPos.y > fromPos.y;
  x1 = fcx; y1 = down ? fromPos.y + fromSize.h : fromPos.y;
  x2 = tcx; y2 = down ? toPos.y : toPos.y + toSize.h;
  var my = (y1 + y2) / 2;
  return 'M' + x1 + ',' + y1 + ' C' + x1 + ',' + my + ' ' + x2 + ',' + my + ' ' + x2 + ',' + y2;
}

// 算出能看到整张图的缩放与平移
function computeFit(bbox, viewW, viewH) {
  var scale = Math.min((viewW - 60) / bbox.w, (viewH - 60) / bbox.h, 1);
  if (!(scale > 0)) scale = 1;
  if (scale < 0.2) scale = 0.2;
  return {
    scale: scale,
    x: (viewW - bbox.w * scale) / 2 - bbox.x * scale,
    y: (viewH - bbox.h * scale) / 2 - bbox.y * scale
  };
}

// prompt.js — 指挥台：把画布选区编译成一条带精确上下文的 AI 指令（上下文编译器，模板走 i18n）

// 选区 → 指令文本：范围、专业签名、可复用零件、FRP 约束一次说清
function buildPrompt(graph, selectedPaths, instruction) {
  var sel = graph.files.filter(function (f) { return selectedPaths.indexOf(f.path) >= 0; });
  var lines = [t('pHeader'), '', t('pScope')];
  sel.forEach(function (f) {
    lines.push('- ' + f.path);
    f.functions.forEach(function (fn) {
      var d = fn.desc ? ' — ' + fn.desc : '';
      lines.push('  - ' + fn.name + ' ' + (fn.level !== '-' ? fn.level : '') + ' ' + fn.signature + d);
    });
  });
  var deps = collectDeps(graph, selectedPaths);
  if (deps.length) {
    lines.push('', t('pDeps'));
    deps.forEach(function (f) {
      var names = f.functions.map(function (fn) { return fn.name; }).join(', ');
      lines.push('- ' + f.path + ' (' + names + ')');
    });
  }
  lines.push('', t('pNeed'), instruction || t('pNoNeed'), '', t('pRule'));
  return lines.join('\n');
}

// 找出选区向外引用的文件，作为"可复用"上下文一并交给 AI
function collectDeps(graph, selectedPaths) {
  var out = [], seen = {};
  graph.edges.forEach(function (e) {
    if (selectedPaths.indexOf(e.from) >= 0 && selectedPaths.indexOf(e.to) < 0 && !seen[e.to]) {
      seen[e.to] = true;
      var f = graph.files.filter(function (x) { return x.path === e.to; })[0];
      if (f) out.push(f);
    }
  });
  return out;
}

// 复制到剪贴板；老浏览器与 file:// 环境退回隐藏 textarea 方案
function copyText(text, done) {
  if (typeof navigator !== 'undefined' && navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () { done(true); }, function () { copyFallback(text, done); });
  } else {
    copyFallback(text, done);
  }
}

function copyFallback(text, done) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  var ok = false;
  try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
  document.body.removeChild(ta);
  done(ok);
}

// render.js — 渲染层：卡片、带箭头的连线、聚焦淡出、层带标签、块式详情面板（文案全部走 i18n）

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// 模块名 → 稳定的颜色，帮人一眼把同模块的卡片归为一组
function modHue(module) {
  var h = 0;
  for (var i = 0; i < module.length; i++) h = (h * 31 + module.charCodeAt(i)) % 360;
  return h;
}

// 选区的"邻居圈"：选中的 + 与之直接相连的；其余卡片淡出
function focusSet(graph, sel) {
  if (!sel.size) return null;
  var set = {};
  sel.forEach(function (p) { set[p] = 1; });
  graph.edges.forEach(function (e) {
    if (sel.has(e.from)) set[e.to] = 1;
    if (sel.has(e.to)) set[e.from] = 1;
  });
  return set;
}

// 单张卡片：标题给人看，函数行 = 白话 + 引用数 + 改动圆点；宽度字号随缩放档位
function cardHtml(file, pos, state) {
  var scale = state.cardScale || 1;
  var fns = visibleFns(file, state.showMinor);
  var shown = fns.slice(0, MAX_ROWS_SHOWN);
  var rows = shown.map(function (fn) {
    var d = fn.desc ? esc(fn.desc) : t('noDesc');
    var cls = 'fn-desc' + (fn.desc ? '' : ' blank') + (fn.minor ? ' minor' : '');
    var refs = fn.refs !== '-' ? t('refs', esc(fn.refs)) : '';
    var dot = fn.changedKind ?
      '<i class="fn-dot ' + fn.changedKind + '" title="' + t(fn.changedKind === 'added' ? 'dotAdded' : 'dotChanged') + '"></i>' : '';
    return '<div class="fn-row"><span class="' + cls + '" title="' + esc(fn.name) + ' ' + esc(fn.signature) + '">' + dot + d +
      '</span><span class="fn-refs">' + refs + '</span></div>';
  }).join('');
  if (fns.length > shown.length) rows += '<div class="fn-row fn-more">' + t('moreRows', fns.length - shown.length) + '</div>';
  var cls = 'card ' + file.level.toLowerCase() + (state.sel.has(file.path) ? ' selected' : '') +
    (file.changed ? ' changed' : '') + (state.focus && !state.focus[file.path] ? ' faded' : '');
  var badge = file.changed ? '<span class="badge-changed">' + t('changedBadge') + '</span>' : '';
  var lvWord = t(LEVEL_RANK[file.level] ? file.level : 'L-');
  var dot = '<i class="mod-dot" style="background:hsl(' + modHue(file.module) + ',45%,52%)"></i>';
  var size = 'width:' + Math.round(CARD_W * scale) + 'px;font-size:' + (13 * scale).toFixed(1) + 'px';
  return '<div class="' + cls + '" data-path="' + esc(file.path) + '" style="left:' + pos.x + 'px;top:' + pos.y + 'px;' + size + '">' +
    '<div class="card-head">' + badge + '<div class="card-title">' + esc(file.name) + '</div>' +
    '<div class="card-sub">' + dot + esc(file.module) + ' · ' + lvWord + '</div></div>' + rows + '</div>';
}

// tools 虚线框、层带标签、孤立带标签（都在画布坐标系内，跟随缩放平移）
function labelsHtml(layout) {
  var html = '';
  if (layout.toolsBox) {
    var b = layout.toolsBox;
    html += '<div id="tools-box" style="left:' + b.x + 'px;top:' + b.y + 'px;width:' + b.w + 'px;height:' + b.h + 'px"></div>' +
      '<div class="band-label" style="left:' + (b.x + 16) + 'px;top:' + (b.y - 8) + 'px">' + t('toolsBox') + '</div>';
  }
  layout.bands.forEach(function (band) {
    html += '<div class="band-label" style="left:' + band.x + 'px;top:' + band.y + 'px">' + t(band.key) + '</div>';
  });
  if (layout.isoLabel) {
    html += '<div class="band-label iso" style="left:' + layout.isoLabel.x + 'px;top:' + layout.isoLabel.y + 'px">' + t('isoBand') + '</div>';
  }
  return html;
}

// 连线整体重画：方向箭头 + 选区相关标红 + 无关线淡出
function edgesSvgHtml(graph, layout, selection) {
  var defs = '<defs>' +
    '<marker id="arw" viewBox="0 0 8 8" refX="7.2" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><polygon points="0,0 8,4 0,8" fill="#cfcaba"/></marker>' +
    '<marker id="arw-hot" viewBox="0 0 8 8" refX="7.2" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><polygon points="0,0 8,4 0,8" fill="#d97757"/></marker></defs>';
  return defs + graph.edges.map(function (e) {
    var fp = layout.positions[e.from], tp = layout.positions[e.to];
    if (!fp || !tp) return '';
    var hot = selection.has(e.from) || selection.has(e.to);
    var cls = hot ? 'hot' : (selection.size ? 'faded' : '');
    var d = edgePath(fp, layout.sizes[e.from], tp, layout.sizes[e.to]);
    return '<path class="' + cls + '" data-from="' + esc(e.from) + '" data-to="' + esc(e.to) + '" d="' + d +
      '" marker-end="url(#' + (hot ? 'arw-hot' : 'arw') + ')"/>';
  }).join('');
}

// 全量重绘世界（小图足够快，逻辑简单不出错）
function renderWorld(state) {
  var g = state.graph, l = state.layout;
  state.focus = focusSet(g, state.sel);
  var html = labelsHtml(l);
  g.files.forEach(function (f) {
    var pos = l.positions[f.path];
    if (pos) html += cardHtml(f, pos, state);
  });
  document.getElementById('cards').innerHTML = html;
  var svg = document.getElementById('edges');
  svg.setAttribute('width', l.bbox.x + l.bbox.w + 200);
  svg.setAttribute('height', l.bbox.y + l.bbox.h + 200);
  svg.innerHTML = edgesSvgHtml(g, l, state.sel);
  document.getElementById('meta').textContent = metaText(state);
  document.getElementById('empty-tip').hidden = g.files.length > 0;
  renderChangesChip(g);
}

// 顶栏摘要：项目名 + 功能块数 + 功能数 + 连线数 + 小函数折叠情况
function metaText(state) {
  var g = state.graph, all = 0, minor = 0;
  g.files.forEach(function (f) { f.functions.forEach(function (fn) { all++; if (fn.minor) minor++; }); });
  var s = t('metaLine', g.meta.project || t('unnamed'), visibleFiles(g, state.showMinor).length, all - minor);
  if (minor) s += t(state.showMinor ? 'metaMinorShown' : 'metaMinorHidden', minor);
  s += g.edges.length ? t('metaEdges', g.edges.length) : t('metaNoEdges');
  return s;
}

// 顶栏小胶囊：有改动记录才出现，点击一键选中"AI 动过的地方"
function renderChangesChip(graph) {
  var chip = document.getElementById('changes-chip');
  chip.hidden = !graph.changes;
  if (graph.changes) chip.textContent = t('chip', graph.changes.entries.length, graph.changes.date);
}

// 详情面板：块式布局——名字/层级/引用一行、签名一行、白话一行，永不压缩
function renderDetail(file) {
  var el = document.getElementById('detail');
  if (!file) { el.hidden = true; return; }
  var blocks = file.functions.map(function (fn) {
    var tag = fn.minor ? '<span class="minor-tag">' + t('minorTag') + '</span>' : '';
    var refs = fn.refs !== '-' ? '<span class="d-refs">' + t('refs', esc(fn.refs)) + '</span>' : '';
    var lv = fn.level !== '-' ? '<span class="d-lv">' + esc(fn.level) + '</span>' : '';
    var sig = fn.signature ? '<div class="d-sig">' + esc(fn.signature) + '</div>' : '';
    var desc = '<div class="d-desc' + (fn.desc ? '' : ' blank') + '">' + (fn.desc ? esc(fn.desc) : t('noDesc')) + '</div>';
    return '<div class="d-fn"><div class="d-fn-head"><span class="d-name">' + esc(fn.name) + '</span>' + lv + tag + refs + '</div>' +
      sig + desc + '</div>';
  }).join('');
  el.innerHTML = '<button class="d-close" data-close="1">✕</button><h3>' + esc(file.name) + '</h3>' +
    '<div class="d-path">' + esc(file.path) + '</div>' + blocks +
    '<div class="d-note">' + t('detailNote') + '</div>';
  el.hidden = false;
}

// 底部操作条：选了东西才出现，引导"框选 → 说人话 → 拿指令"
function renderActionBar(state) {
  var bar = document.getElementById('action-bar');
  bar.hidden = state.sel.size === 0;
  if (state.sel.size > 0) document.getElementById('sel-count').textContent = t('selCount', state.sel.size);
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.hidden = false;
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(function () { el.hidden = true; }, 2600);
}

// ui.js — 次级交互：语言切换、细节开关、搜索、布局记忆——把"看多细、看哪种语言"都交给用户选

var SCALE_STEPS = [0.85, 1, 1.2, 1.45];

function initUi() {
  var langSel = document.getElementById('lang-select');
  langSel.value = getLang();
  langSel.onchange = function () { setLang(langSel.value); onLangChanged(); };
  document.getElementById('btn-minor').onclick = toggleMinor;
  document.getElementById('btn-refresh').onclick = function () { location.reload(); };
  document.getElementById('btn-relayout').onclick = resetLayout;
  document.getElementById('btn-card-minus').onclick = function () { setCardScale(-1); };
  document.getElementById('btn-card-plus').onclick = function () { setCardScale(1); };
  document.getElementById('search').oninput = runSearch;
  updateChrome();
}

// 卡片缩放三档往返：布局重算，档位按浏览器记住
function setCardScale(delta) {
  var i = SCALE_STEPS.indexOf(state.cardScale);
  if (i < 0) i = 1;
  i = Math.max(0, Math.min(SCALE_STEPS.length - 1, i + delta));
  if (SCALE_STEPS[i] === state.cardScale) return;
  state.cardScale = SCALE_STEPS[i];
  try { localStorage.setItem('babycode-scale', String(state.cardScale)); } catch (e) { i = i; }
  relayout();
}

// 重算布局并套用用户手动挪过的位置（细节开关/缩放共用）
function relayout() {
  state.layout = computeLayout(state.graph, state.showMinor, state.cardScale);
  applySavedPositions();
  fitView();
  refresh();
}

// 把工具栏、图例、占位符刷成当前语言
function updateChrome() {
  var els = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < els.length; i++) els[i].textContent = t(els[i].getAttribute('data-i18n'));
  document.getElementById('instruction').placeholder = t('instrPh');
  document.getElementById('search').placeholder = t('searchPh');
  document.getElementById('empty-tip').textContent = t('emptyTip');
  document.getElementById('btn-prompt').textContent = t('genBtn');
  document.getElementById('btn-minor').textContent = t(state.showMinor ? 'minorHide' : 'minorShow');
  document.getElementById('btn-card-minus').title = t('cardSmaller');
  document.getElementById('btn-card-plus').title = t('cardBigger');
  document.getElementById('help').title = t('hint');
}

function onLangChanged() {
  updateChrome();
  if (state.isDemo) { setGraph(demoGraph()); return; }
  refresh();
  renderDetail(null);
}

// 显示/隐藏小函数（<10 行且单调用点的私有助手），粒度由用户决定
function toggleMinor() {
  state.showMinor = !state.showMinor;
  try { localStorage.setItem('babycode-minor', state.showMinor ? '1' : ''); } catch (e) { state.showMinor = state.showMinor; }
  relayout();
  updateChrome();
}

function posKey() { return 'babycode-pos:' + (state.graph.meta.project || 'default'); }

// 用户拖过的卡片位置按项目记住，刷新数据后仍保持自己的摆法
function savePositions() {
  try { localStorage.setItem(posKey(), JSON.stringify(state.layout.positions)); } catch (e) { return; }
}

function applySavedPositions() {
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(posKey()) || 'null'); } catch (e) { saved = null; }
  if (!saved) return;
  Object.keys(saved).forEach(function (p) {
    if (state.layout.positions[p]) state.layout.positions[p] = saved[p];
  });
  state.layout.bbox = layoutBbox(state.layout.positions, state.layout.sizes, state.layout.toolsBox);
}

// 一键回到自动排版（清掉记住的手动位置）
function resetLayout() {
  try { localStorage.removeItem(posKey()); } catch (e) { return; }
  state.layout = computeLayout(state.graph, state.showMinor, state.cardScale);
  fitView();
  refresh();
}

// 搜索：命中的卡片保持醒目，其余压暗；清空恢复
function runSearch() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    var f = fileByPath(cards[i].getAttribute('data-path'));
    if (!f) continue;
    var hay = (f.path + ' ' + f.module + ' ' + f.functions.map(function (fn) { return fn.name + ' ' + fn.desc; }).join(' ')).toLowerCase();
    cards[i].classList.toggle('dim', !!q && hay.indexOf(q) < 0);
  }
}

function fileByPath(p) {
  return state.graph.files.filter(function (f) { return f.path === p; })[0];
}

// app.js — 交互层：启动装载、平移缩放、框选、拖卡片、载入数据、把选区变成指令

var state = { graph: null, layout: null, sel: new Set(), view: { x: 0, y: 0, scale: 1 },
  showMinor: false, isDemo: true, cardScale: 1, focus: null };
var gesture = null;

function applyView() {
  document.getElementById('world').style.transform =
    'translate(' + state.view.x + 'px,' + state.view.y + 'px) scale(' + state.view.scale + ')';
}

function screenToWorld(cx, cy) {
  var r = document.getElementById('canvas').getBoundingClientRect();
  return { x: (cx - r.left - state.view.x) / state.view.scale, y: (cy - r.top - state.view.y) / state.view.scale };
}

function refresh() {
  renderWorld(state);
  renderActionBar(state);
  runSearch();
}

function setGraph(graph) {
  state.graph = graph;
  state.layout = computeLayout(graph, state.showMinor, state.cardScale);
  applySavedPositions();
  state.sel = new Set();
  fitView();
  refresh();
  renderDetail(null);
}

function fitView() {
  var c = document.getElementById('canvas');
  state.view = computeFit(state.layout.bbox, c.clientWidth, c.clientHeight);
  applyView();
}

function zoomAt(cx, cy, factor) {
  var r = document.getElementById('canvas').getBoundingClientRect();
  var s = Math.min(2.5, Math.max(0.2, state.view.scale * factor));
  var k = s / state.view.scale;
  state.view.x = (cx - r.left) - ((cx - r.left) - state.view.x) * k;
  state.view.y = (cy - r.top) - ((cy - r.top) - state.view.y) * k;
  state.view.scale = s;
  applyView();
}

function onWheel(e) {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) zoomAt(e.clientX, e.clientY, Math.pow(1.0015, -e.deltaY));
  else { state.view.x -= e.deltaX; state.view.y -= e.deltaY; applyView(); }
}

function onDown(e) {
  if (e.button !== 0) return;
  var card = e.target.closest ? e.target.closest('.card') : null;
  if (card) {
    var p = state.layout.positions[card.getAttribute('data-path')];
    gesture = { type: 'card', path: card.getAttribute('data-path'), el: card, sx: e.clientX, sy: e.clientY,
      ox: p.x, oy: p.y, moved: false, shift: e.shiftKey };
  } else {
    gesture = { type: 'marquee', sx: e.clientX, sy: e.clientY, moved: false, shift: e.shiftKey };
  }
}

function onMove(e) {
  if (!gesture) return;
  var dx = e.clientX - gesture.sx, dy = e.clientY - gesture.sy;
  if (Math.abs(dx) + Math.abs(dy) > 4) gesture.moved = true;
  if (!gesture.moved) return;
  if (gesture.type === 'card') {
    var p = state.layout.positions[gesture.path];
    p.x = gesture.ox + dx / state.view.scale;
    p.y = gesture.oy + dy / state.view.scale;
    gesture.el.style.left = p.x + 'px';
    gesture.el.style.top = p.y + 'px';
    document.getElementById('edges').innerHTML = edgesSvgHtml(state.graph, state.layout, state.sel);
  } else {
    var m = document.getElementById('marquee');
    var r = document.getElementById('canvas').getBoundingClientRect();
    m.hidden = false;
    m.style.left = Math.min(gesture.sx, e.clientX) - r.left + 'px';
    m.style.top = Math.min(gesture.sy, e.clientY) - r.top + 'px';
    m.style.width = Math.abs(dx) + 'px';
    m.style.height = Math.abs(dy) + 'px';
  }
}

function onUp(e) {
  if (!gesture) return;
  var g = gesture;
  gesture = null;
  document.getElementById('marquee').hidden = true;
  if (g.type === 'card') {
    if (g.moved) {
      state.layout.bbox = layoutBbox(state.layout.positions, state.layout.sizes, state.layout.toolsBox);
      savePositions();
      refresh();
    } else { applySelectClick(g.path, g.shift); }
    return;
  }
  if (!g.moved) { state.sel = new Set(); afterSelectionChange(); return; }
  var a = screenToWorld(Math.min(g.sx, e.clientX), Math.min(g.sy, e.clientY));
  var b = screenToWorld(Math.max(g.sx, e.clientX), Math.max(g.sy, e.clientY));
  selectInRect(a.x, a.y, b.x, b.y, g.shift);
}

function applySelectClick(path, shift) {
  if (shift) { if (state.sel.has(path)) state.sel.delete(path); else state.sel.add(path); }
  else { state.sel = new Set([path]); }
  afterSelectionChange();
}

function selectInRect(x1, y1, x2, y2, additive) {
  if (!additive) state.sel = new Set();
  state.graph.files.forEach(function (f) {
    var p = state.layout.positions[f.path];
    if (!p) return;
    var s = state.layout.sizes[f.path];
    if (p.x < x2 && p.x + s.w > x1 && p.y < y2 && p.y + s.h > y1) state.sel.add(f.path);
  });
  afterSelectionChange();
}

function afterSelectionChange() {
  refresh();
  if (state.sel.size === 1) {
    var path = Array.from(state.sel)[0];
    renderDetail(fileByPath(path));
  } else { renderDetail(null); }
}

// 一键选中上次任务动过的文件，配合底部指令条继续追问或改造
function selectChanged() {
  if (!state.graph.changes) return;
  state.sel = new Set(state.graph.changes.entries.map(function (e) { return e.path; })
    .filter(function (p) { return state.layout.positions[p]; }));
  afterSelectionChange();
}

// 识别三种数据：graph.js（自动装载同款）、graph.json、FUNCTIONS.md
function loadText(name, text) {
  try {
    if (/^\s*window\.BABYCODE_GRAPH\s*=/.test(text)) {
      text = text.replace(/^\s*window\.BABYCODE_GRAPH\s*=/, '').replace(/;\s*$/, '');
    }
    var graph = /^\s*[\[{]/.test(text) ? normalizeGraph(JSON.parse(text)) : parseFunctionsMd(text);
    if (!graph.meta.project) graph.meta.project = name;
    state.isDemo = false;
    setGraph(graph);
    showToast(t('loaded', name));
  } catch (err) { showToast(t('badFile', err.message)); }
}

function readFile(file) {
  var r = new FileReader();
  r.onload = function () { loadText(file.name, r.result); };
  r.readAsText(file);
}

function onPrompt() {
  var txt = document.getElementById('instruction').value.trim();
  var p = buildPrompt(state.graph, Array.from(state.sel), txt);
  copyText(p, function (ok) {
    showToast(ok ? t('copied') : t('copyFail'));
    if (!ok) console.log(p);
  });
}

// 鼠标悬停卡片时，即时点亮它的所有连线（只改 class，不重绘）
function hoverEdges(e, on) {
  var card = e.target.closest ? e.target.closest('.card') : null;
  if (!card) return;
  var p = card.getAttribute('data-path');
  var paths = document.querySelectorAll('#edges path');
  for (var i = 0; i < paths.length; i++) {
    if (paths[i].getAttribute('data-from') === p || paths[i].getAttribute('data-to') === p) {
      paths[i].classList.toggle('hover-hot', on);
    }
  }
}

function initApp() {
  try { state.showMinor = localStorage.getItem('babycode-minor') === '1'; } catch (e) { state.showMinor = false; }
  try {
    var sc = parseFloat(localStorage.getItem('babycode-scale'));
    if (SCALE_STEPS.indexOf(sc) >= 0) state.cardScale = sc;
  } catch (e) { state.cardScale = 1; }
  var boot = typeof window !== 'undefined' && window.BABYCODE_GRAPH ? window.BABYCODE_GRAPH : null;
  initLang(boot && boot.meta ? boot.meta.lang : null);
  var canvas = document.getElementById('canvas');
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  document.getElementById('btn-fit').onclick = fitView;
  document.getElementById('btn-zoom-in').onclick = function () { zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, 1.25); };
  document.getElementById('btn-zoom-out').onclick = function () { zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, 0.8); };
  document.getElementById('btn-demo').onclick = function () { state.isDemo = true; setGraph(demoGraph()); };
  document.getElementById('btn-open').onclick = function () { document.getElementById('file-input').click(); };
  document.getElementById('file-input').onchange = function (e) { if (e.target.files[0]) readFile(e.target.files[0]); };
  document.getElementById('btn-prompt').onclick = onPrompt;
  document.getElementById('changes-chip').onclick = selectChanged;
  document.getElementById('detail').addEventListener('click', function (e) {
    if (e.target.getAttribute('data-close')) renderDetail(null);
  });
  document.getElementById('instruction').addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') onPrompt();
  });
  window.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') renderDetail(null);
  });
  document.getElementById('cards').addEventListener('mouseover', function (e) { hoverEdges(e, true); });
  document.getElementById('cards').addEventListener('mouseout', function (e) { hoverEdges(e, false); });
  window.addEventListener('dragover', function (e) { e.preventDefault(); document.body.classList.add('dropping'); });
  window.addEventListener('dragleave', function () { document.body.classList.remove('dropping'); });
  window.addEventListener('drop', function (e) {
    e.preventDefault();
    document.body.classList.remove('dropping');
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  initUi();
  if (boot) {
    state.isDemo = false;
    setGraph(normalizeGraph(boot));
    showToast(t('autoLoaded'));
  } else {
    state.isDemo = true;
    setGraph(demoGraph());
  }
}

document.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
