<svg viewBox="0 0 880 350" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="350" fill="#ffffff"/>

  <text x="440" y="26" text-anchor="middle" font-size="11" letter-spacing="0.5" fill="#9ca3af">FRP — MEASURED OVER A 15-DAY TRIAL</text>

  <line x1="440" y1="46" x2="440" y2="292" stroke="#eef0f2" stroke-width="1"/>

  <!-- LEFT: Codex task throughput -->
  <text x="220" y="66" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Codex CLI · GPT-5.5-high</text>
  <text x="220" y="84" text-anchor="middle" font-size="11" fill="#9ca3af">tasks completed per quota cycle</text>

  <rect x="160" y="100" width="120" height="24" rx="12" fill="#f0fdf4"/>
  <text x="220" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">+67% tasks/quota</text>

  <line x1="80" y1="250" x2="380" y2="250" stroke="#eef0f2" stroke-width="1"/>

  <rect x="130" y="178" width="70" height="72" rx="8" fill="#bfdbfe"/>
  <text x="165" y="166" text-anchor="middle" font-size="21" font-weight="700" fill="#2563eb">6</text>
  <text x="165" y="270" text-anchor="middle" font-size="11" fill="#9ca3af">Before</text>

  <rect x="250" y="130" width="70" height="120" rx="8" fill="#16a34a"/>
  <text x="285" y="118" text-anchor="middle" font-size="21" font-weight="700" fill="#16a34a">10</text>
  <text x="285" y="270" text-anchor="middle" font-size="11" fill="#9ca3af">After</text>

  <!-- RIGHT: Claude sustained unattended run -->
  <text x="660" y="66" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Claude Opus 4.8 · Max 5x</text>
  <text x="660" y="84" text-anchor="middle" font-size="11" fill="#9ca3af">longest unattended run in a 5h window</text>

  <text x="660" y="118" text-anchor="middle" font-size="10" letter-spacing="0.5" fill="#9ca3af">BEFORE</text>
  <text x="660" y="152" text-anchor="middle" font-size="28" font-weight="800" fill="#f97316">~1 hour</text>
  <text x="660" y="171" text-anchor="middle" font-size="10.5" fill="#9ca3af">before hitting the usage wall</text>

  <text x="660" y="197" text-anchor="middle" font-size="15" fill="#d1d5db">↓</text>
  <rect x="600" y="206" width="120" height="25" rx="12.5" fill="#faf5ff"/>
  <text x="660" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">≈360× longer</text>

  <text x="660" y="253" text-anchor="middle" font-size="10" letter-spacing="0.5" fill="#9ca3af">AFTER</text>
  <text x="660" y="287" text-anchor="middle" font-size="28" font-weight="800" fill="#16a34a">15 days</text>
  <text x="660" y="306" text-anchor="middle" font-size="10.5" fill="#9ca3af">continuous /loop run, completed</text>

  <text x="440" y="336" text-anchor="middle" font-size="10" fill="#c1c5cb">Self-reported by the author — not an independently audited benchmark</text>
</svg>
