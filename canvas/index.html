<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>babycode canvas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <div id="brand">babycode<span id="meta"></span></div>
  <div id="toolbar">
    <button id="btn-open" data-i18n="open"></button>
    <input type="file" id="file-input" accept=".json,.md,.txt,.js" hidden>
    <button id="btn-demo" data-i18n="demo"></button>
    <button id="btn-fit" data-i18n="fit"></button>
    <button id="btn-refresh" data-i18n="refresh"></button>
    <button id="btn-relayout" data-i18n="relayout"></button>
    <button id="btn-minor"></button>
    <button id="btn-card-minus" aria-label="smaller cards">A−</button>
    <button id="btn-card-plus" aria-label="bigger cards">A+</button>
    <button id="btn-zoom-out" aria-label="zoom out">−</button>
    <button id="btn-zoom-in" aria-label="zoom in">＋</button>
  </div>
</header>
<div id="legend">
  <span><i class="sw sw-l4"></i><span data-i18n="legendL4"></span></span>
  <span><i class="sw sw-l3"></i><span data-i18n="legendL3"></span></span>
  <span><i class="sw sw-tool"></i><span data-i18n="legendTools"></span></span>
  <button id="changes-chip" hidden></button>
  <span class="right">
    <input id="search" type="search">
    <select id="lang-select"><option value="zh">中文</option><option value="en">English</option></select>
    <span id="help" class="help">?</span>
  </span>
</div>
<main id="canvas">
  <div id="world">
    <svg id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="cards"></div>
  </div>
  <div id="marquee" hidden></div>
  <div id="empty-tip" hidden></div>
</main>
<aside id="detail" hidden></aside>
<footer id="action-bar" hidden>
  <div id="sel-count"></div>
  <textarea id="instruction" rows="2"></textarea>
  <button id="btn-prompt"></button>
</footer>
<div id="toast" hidden></div>
<script src="graph.js"></script>
<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="layout.js"></script>
<script src="prompt.js"></script>
<script src="render.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
